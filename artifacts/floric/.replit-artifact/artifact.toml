kind = "web"
previewPath = "/"
title = "Floric – Eventdekoration"
version = "1.0.0"
id = "artifacts/floric"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22494

[services.development]
run = "pnpm --filter @workspace/floric run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/floric", "run", "build" ]
publicDir = "artifacts/floric/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22494"
BASE_PATH = "/"
